<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Inner Echoes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .navbar { background: rgba(255,255,255,0.95); box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .navbar-brand { color: #667eea !important; font-weight: bold; font-size: 24px; }
        .nav-link { color: #666 !important; font-weight: 500; transition: color 0.3s; }
        .nav-link:hover { color: #667eea !important; }
        .analytics-container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .analytics-panel { background: white; border-radius: 15px; padding: 30px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); margin-bottom: 30px; }
        .stat-card { background: linear-gradient(135deg, #f5f5f5 0%, #e9e9e9 100%); border-radius: 12px; padding: 20px; text-align: center; margin-bottom: 20px; }
        .stat-number { font-size: 32px; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; font-size: 14px; text-transform: uppercase; }
        .chart-container { position: relative; height: 400px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="/"><i class="bi bi-journal"></i> Inner Echoes</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house"></i> Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="/add"><i class="bi bi-pen"></i> Add Entry</a></li>
                    <li class="nav-item"><a class="nav-link" href="/profile"><i class="bi bi-person"></i> Profile</a></li>
                    <li class="nav-item"><a class="nav-link" href="/logout"><i class="bi bi-door-open"></i> Logout</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="analytics-container">
        <div class="analytics-panel">
            <h2 class="mb-4">📊 Your Writing Analytics</h2>
            
            <div class="row">
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-number">{{ total_entries }}</div>
                        <div class="stat-label">Total Entries</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-number">{{ streak }}</div>
                        <div class="stat-label">Current Streak</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-number">{{ max_streak }}</div>
                        <div class="stat-label">Max Streak</div>
                    </div>
                </div>
            </div>
            
            <div class="row mt-4">
                <div class="col-md-6 mb-4">
                    <h4 class="mb-3">Mood Distribution</h4>
                    <div class="chart-container" style="position: relative; height: 300px;">
                        <canvas id="moodChart"></canvas>
                    </div>
                </div>
                <div class="col-md-6 mb-4">
                    <h4 class="mb-3">Mood Trend (Last 30 Active Days)</h4>
                    <div class="chart-container" style="position: relative; height: 300px;">
                        <canvas id="trendChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const moodData = {{ mood_data|tojson }};
        const ctx = document.getElementById('moodChart').getContext('2d');
        const moodChart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: moodData.map(d => d.mood),
                datasets: [{
                    data: moodData.map(d => d.count),
                    backgroundColor: [
                        '#FFD700', '#4169E1', '#228B22', '#A9A9A9', '#9370DB', '#DC143C', '#FF8C00'
                    ]
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                    }
                }
            }
        });

        // Timeline Trend Chart
        const timelineData = {{ timeline_data|tojson }};
        const ctxTrend = document.getElementById('trendChart').getContext('2d');
        const trendChart = new Chart(ctxTrend, {
            type: 'line',
            data: {
                labels: timelineData.map(d => d.date),
                datasets: [{
                    label: 'Mood Trend',
                    data: timelineData.map(d => d.score),
                    borderColor: '#667eea',
                    backgroundColor: 'rgba(102, 126, 234, 0.2)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    y: {
                        beginAtZero: false,
                        suggestedMax: 3,
                        suggestedMin: -3,
                        ticks: {
                            callback: function(value) {
                                if(value === 3) return 'Excited';
                                if(value === 2) return 'Happy';
                                if(value === 1) return 'Calm';
                                if(value === 0) return 'Neutral';
                                if(value === -1) return 'Sad';
                                if(value === -2) return 'Anxious';
                                if(value === -3) return 'Angry';
                                return value;
                            }
                        }
                    }
                },
                plugins: {
                    legend: {
                        display: false
                    }
                }
            }
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
