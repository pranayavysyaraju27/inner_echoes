<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inner Echoes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-container { 
            width: 100%; 
            max-width: 450px; 
        }
        .card { 
            border: none; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.3); 
            border-radius: 15px; 
            overflow: hidden;
        }
        .card-header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; 
            padding: 40px; 
            text-align: center; 
            border: none;
        }
        .card-header h2 { 
            margin: 0; 
            font-weight: bold; 
            font-size: 32px;
        }
        .card-header p { 
            margin: 10px 0 0 0; 
            font-style: italic; 
            opacity: 0.9; 
            font-size: 14px;
        }
        .card-body { 
            padding: 40px; 
        }
        .form-control { 
            border-radius: 10px; 
            border: 2px solid #eee; 
            padding: 12px 15px; 
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-control:focus { 
            border-color: #667eea; 
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .form-label { 
            font-weight: 600; 
            color: #333; 
            margin-bottom: 8px;
        }
        .btn-login { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            border: none; 
            padding: 12px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 10px;
            transition: transform 0.2s;
            color: white;
        }
        .btn-login:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            color: white;
        }
        .alert { 
            border-radius: 10px; 
            border: none;
            margin-bottom: 20px;
        }
        .signup-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .signup-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }
        .signup-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="card-header">
                <h2>Inner Echoes</h2>
                <p>Where your thoughts find their voice</p>
            </div>
            <div class="card-body">
                {% if error %}
                    <div class="alert alert-danger" role="alert">
                        ❌ {{ error }}
                    </div>
                {% endif %}
                <form method="POST">
                    <div class="mb-4">
                        <label for="username" class="form-label">👤 Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">🔐 Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn btn-login w-100 btn-lg">Login</button>
                    <div class="text-center my-3 text-muted" style="font-size: 14px; font-weight: 500;">OR</div>
                    <a href="#" class="btn btn-light w-100 btn-lg mb-2" style="border-radius: 10px; border: 2px solid #eee; font-weight: 600; color: #333;" onclick="alert('Google OAuth backend integration pending credentials!')">
                        <i class="bi bi-google text-danger me-2"></i> Sign in with Google
                    </a>
                </form>
                <div class="signup-link">
                    <p class="mb-0">Don't have an account? <a href="/signup">Sign Up Here</a></p>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
