<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Feeling Tracker - Inner Echoes</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
<style>
body{background:#F9FAFB;color:#334155;min-height:100vh;}
.app-shell{display:flex;min-height:100vh;}
.app-sidebar{width:240px;background:#E2E8F0;border-right:1px solid #CBD5E1;padding:26px;position:fixed;top:0;left:0;bottom:0;}
.app-content{margin-left:240px;padding:32px;width:calc(100%-240px);max-width:1200px;margin-right:auto;}
.section-card{background:#fff;border-radius:18px;box-shadow:0 8px 20px rgba(15,23,42,.08);padding:24px;margin-bottom:24px;}
.mood-strip{display:flex;gap:10px;align-items:center;}
.mood-dot{width:18px;height:18px;border-radius:50%;}
</style>
</head>
<body>
<div class="app-shell">
  <aside class="app-sidebar"><h1>Inner Echoes</h1><div class="tagline">Where your thoughts find their voice</div><a href="/">Home</a><a href="/journal">Journal</a><a href="/mood" class="active">Mood</a><a href="/uploads">Uploads</a><a href="/profile">Profile</a></aside>
  <main class="app-content">
    <div class="section-card"><h2>Weekly Mood Tracker</h2><div class="mood-strip" style="margin:16px 0;">
      {% for m,count in mood_summary.items() %}
        <div style="display:flex;flex-direction:column;align-items:center;">
          <div class="mood-dot" style="background: {% if m == 'happy' %}#FFD76A{% elif m == 'sad' %}#6CA6FF{% else %}#9F7AEA{% endif %};"></div>
          <small>{{ m|title }}</small>
          <small>{{ count }}</small>
        </div>
      {% endfor %}
    </div>
    <p style="margin-top:16px;">You felt mostly {{ top_mood }} this week.</p></div>
  </main>
</div>
</body>
</html>
